<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Расходы">
<title>Учёт расходов</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#F2F2F7;color:#1C1C1E;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:0 0 90px}
.topbar{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid rgba(0,0,0,0.12);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.back-btn{background:none;border:none;cursor:pointer;color:#007AFF;font-size:17px;padding:0 4px}
.topbar h1{font-size:17px;font-weight:600;flex:1;letter-spacing:-0.3px}
.subtitle{font-size:13px;color:#8E8E93}
.section{padding:12px 16px}
.card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer}
.card:active{opacity:0.7}
.fab{position:fixed;bottom:28px;right:20px;width:56px;height:56px;border-radius:50%;background:#34C759;border:none;color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;box-shadow:0 4px 20px rgba(52,199,89,0.4)}
.fab:active{transform:scale(0.93)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:30;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:16px 20px 32px;max-height:92vh;overflow-y:auto;animation:slideup 0.25s cubic-bezier(0.32,0.72,0,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:36px;height:5px;background:#E5E5EA;border-radius:3px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:14px}
.lbl{font-size:12px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:7px;display:block}
.inp{width:100%;padding:11px 14px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:16px;background:#fff;color:#1C1C1E;outline:none;font-family:inherit;-webkit-appearance:none}
.inp:focus{border-color:#34C759}
.chip-wrap{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:8px 13px;border:1.5px solid #E5E5EA;border-radius:20px;font-size:13px;background:#fff;color:#3C3C43;cursor:pointer;font-family:inherit;transition:all 0.12s}
.chip.sel{background:#34C759;border-color:#34C759;color:#fff}
.chip.sel-purple{background:#5856D6;border-color:#5856D6;color:#fff}
.chip.sel-orange{background:#FF9500;border-color:#FF9500;color:#fff}
.prow{padding:11px 14px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:15px;background:#fff;color:#1C1C1E;cursor:pointer;margin-bottom:7px;width:100%;text-align:left;display:flex;align-items:center;gap:10px;font-family:inherit}
.prow.sel{border-color:#34C759;background:#F0FFF4;color:#1C7A3A}
.save-btn{width:100%;padding:15px;background:#34C759;border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit}
.save-btn:disabled{background:#C7C7CC;cursor:not-allowed}
.save-btn:active{opacity:0.85}
.del-btn{background:none;border:1.5px solid #FFE4E6;border-radius:10px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:600;color:#FF3B30;flex-shrink:0;font-family:inherit}
.exp-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid #F2F2F7}
.exp-row:last-child{border-bottom:none}
.exp-icon{width:40px;height:40px;border-radius:50%;background:#F2F2F7;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.exp-info{flex:1;min-width:0}
.exp-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-sub{font-size:12px;color:#8E8E93;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:11px;padding:2px 7px;border-radius:8px;font-weight:600;display:inline-block}
.b0{background:#D1FAE5;color:#065F46}.b1{background:#DBEAFE;color:#1E40AF}
.b2{background:#FEF3C7;color:#92400E}.b3{background:#FFE4E6;color:#9F1239}
.b4{background:#EDE9FE;color:#5B21B6}.b5{background:#F3F4F6;color:#374151}
.b6{background:#ECFDF5;color:#064E3B}.b7{background:#FDF2F8;color:#831843}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.fbar{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.fbar::-webkit-scrollbar{display:none}
.fchip{padding:7px 13px;border:1.5px solid #E5E5EA;border-radius:20px;font-size:13px;font-weight:500;background:#fff;color:#8E8E93;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit}
.fchip.on{background:#34C759;border-color:#34C759;color:#fff}
.fchip.on-p{background:#5856D6;border-color:#5856D6;color:#fff}
.sortsel{padding:8px 10px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:13px;background:#fff;color:#1C1C1E;outline:none;cursor:pointer;font-family:inherit;-webkit-appearance:none;flex-shrink:0;max-width:130px}
.tbar{background:#F0FFF4;border-radius:14px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.tbar-lbl{font-size:13px;color:#1C7A3A;font-weight:500}
.tbar-val{font-size:21px;font-weight:700;color:#1C7A3A;letter-spacing:-0.5px}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.tbtn{background:none;border:none;cursor:pointer;font-size:20px;padding:4px 5px;border-radius:8px;line-height:1}
.tbtn:active{background:#F2F2F7}
.type-inv{background:#EDE9FE;color:#5B21B6;font-size:11px;padding:3px 9px;border-radius:8px;font-weight:600}
.type-per{background:#D1FAE5;color:#065F46;font-size:11px;padding:3px 9px;border-radius:8px;font-weight:600}
.adv-pend{background:#FEF3C7;color:#92400E;font-size:11px;padding:2px 8px;border-radius:8px;font-weight:600}
.adv-done{background:#D1FAE5;color:#065F46;font-size:11px;padding:2px 8px;border-radius:8px;font-weight:600}
.bill-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;border-left:4px solid #FF9500}
.bill-card.done{border-left-color:#34C759;opacity:0.7}
.prog-wrap{background:#E5E5EA;border-radius:4px;height:5px;width:100%;margin-top:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:#34C759}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #E5E5EA;border-top-color:#34C759;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:14px;color:#8E8E93;font-size:15px}
.err-box{background:#F2F2F7;border-radius:12px;padding:14px;font-size:12px;font-family:monospace;line-height:1.9;margin:0 16px;color:#1C1C1E}
canvas{width:100%!important;max-height:210px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:0.5px solid #F2F2F7;font-size:14px}
.srow:last-child{border-bottom:none}
.prog-bar-wrap{background:#F2F2F7;border-radius:4px;height:7px;flex:1;margin:0 10px;overflow:hidden;min-width:40px}
.prog-bar-fill{height:100%;border-radius:4px}
.cat-icon-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.icon-btn{width:40px;height:40px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;font-family:inherit}
.icon-btn.on{border-color:#34C759;background:#F0FFF4}
.cat-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid #F2F2F7}
.cat-row:last-child{border-bottom:none}
.tag{font-size:11px;background:#F2F2F7;padding:2px 8px;border-radius:8px;color:#8E8E93;font-weight:500}
.inv-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #F2F2F7}
.inv-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="app" id="app"><div class="loading"><div class="spinner"></div><span>Загрузка...</span></div></div>
<button class="fab" id="fab" style="display:none" onclick="openAddExpense(null)">+</button>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,addDoc,updateDoc,deleteDoc,doc,getDocs,onSnapshot}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB={apiKey:"AIzaSyAaDOtqcnqQbyxttj5y8IYAUHxMTsrspj4",authDomain:"expenses-app-a4565.firebaseapp.com",projectId:"expenses-app-a4565",storageBucket:"expenses-app-a4565.firebasestorage.app",messagingSenderId:"918179761678",appId:"1:918179761678:web:85968596424ed5cc1bb65f"};
const fbApp=initializeApp(FB);
const db=getFirestore(fbApp);

const COLORS=['#34C759','#007AFF','#FF6B35','#AF52DE','#FF2D55','#FF9500','#30D158','#FF3B30','#5856D6','#00C7BE'];
const ICONS=['🛒','🏠','💼','📦','🚗','💡','📢','🔧','📌','🍔','☕','🎯','🏥','📱','✈️','🎁','💰','🖥️','👗','🏋️'];
const SORTS=[{v:'nd',l:'Сначала новые'},{v:'od',l:'Сначала старые'},{v:'hi',l:'Дороже сначала'},{v:'lo',l:'Дешевле сначала'},{v:'cat',l:'По категории'}];

// Check investor view
const P=new URLSearchParams(location.search);
const INV_TOKEN=P.get('investor'), PROJ_TOKEN=P.get('project');
const IS_INV=!!(INV_TOKEN&&PROJ_TOKEN);

let D={projects:[],categories:[],expenses:[]};
let S={view:'projects',pid:null,modal:null,q:'',fcat:'all',fpay:'all',sort:'nd',apid:null};
let TF={pid:null,cid:null,amt:'',note:'',payer:'me',adv:false,total:'',party:''};
let TC={name:'',icon:'📌'};
let NP={color:COLORS[0],type:'personal',name:'',investors:[]};
let editPid=null,editCid=null;
let chart=null;

// helpers
const $=id=>document.getElementById(id);
const fmt=n=>(+n||0).toLocaleString('ru-RU')+'₸';
const dt=d=>new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
const cat=id=>D.categories.find(c=>c.id===id)||{name:'Прочее',icon:'📌'};
const proj=id=>D.projects.find(p=>p.id===id)||{name:'—',color:'#C7C7CC',type:'personal',investors:[]};
const bi=i=>['b0','b1','b2','b3','b4','b5','b6','b7'][i%8];
const cc=i=>COLORS[i%COLORS.length];
const avc=s=>{const c=['#FF6B35','#AF52DE','#007AFF','#FF2D55','#FF9500','#5856D6','#00C7BE'];let h=0;for(const x of s)h=(h*31+x.charCodeAt(0))%c.length;return c[h];};
const ini=s=>s.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const pname=(pid,pr)=>pid==='me'||!pid?'Я':(pr?.investors?.find(i=>i.id===pid)?.name||'—');

function ptotal(id){return D.expenses.filter(e=>e.pid===id).reduce((s,e)=>s+e.amt,0)}
function atotal(){return D.expenses.reduce((s,e)=>s+e.amt,0)}

function sortArr(arr){
  const a=arr.slice();
  if(S.sort==='nd')return a.sort((x,y)=>y._t-x._t);
  if(S.sort==='od')return a.sort((x,y)=>x._t-y._t);
  if(S.sort==='hi')return a.sort((x,y)=>y.amt-x.amt);
  if(S.sort==='lo')return a.sort((x,y)=>x.amt-y.amt);
  if(S.sort==='cat')return a.sort((x,y)=>cat(x.cid).name.localeCompare(cat(y.cid).name,'ru'));
  return a;
}

// Firebase ops
async function loadAll(){
  const[ps,cs,es]=await Promise.all([getDocs(collection(db,'projects')),getDocs(collection(db,'categories')),getDocs(collection(db,'expenses'))]);
  D.projects=ps.docs.map(d=>({id:d.id,...d.data()}));
  D.categories=cs.docs.map(d=>({id:d.id,...d.data()}));
  D.expenses=es.docs.map(d=>({id:d.id,...d.data(),_t:d.data().created_at?new Date(d.data().created_at).getTime():0}));
  if(!D.categories.length)await seedCats();
}

async function seedCats(){
  const cats=[{name:'Закуп',icon:'📦'},{name:'Аренда',icon:'🏠'},{name:'Зарплата',icon:'💼'},{name:'Маркетинг',icon:'📢'},{name:'Продукты',icon:'🛒'},{name:'Транспорт',icon:'🚗'},{name:'Коммуналка',icon:'💡'},{name:'Оборудование',icon:'🔧'},{name:'Прочее',icon:'📌'}];
  for(const c of cats){const r=await addDoc(collection(db,'categories'),c);D.categories.push({id:r.id,...c});}
}

function subscribe(){
  onSnapshot(collection(db,'expenses'),snap=>{
    snap.docChanges().forEach(ch=>{
      const d={id:ch.doc.id,...ch.doc.data(),_t:ch.doc.data().created_at?new Date(ch.doc.data().created_at).getTime():0};
      if(ch.type==='added'&&!D.expenses.find(e=>e.id===d.id))D.expenses.push(d);
      else if(ch.type==='modified'){const i=D.expenses.findIndex(e=>e.id===d.id);if(i>=0)D.expenses[i]=d;}
      else if(ch.type==='removed')D.expenses=D.expenses.filter(e=>e.id!==ch.doc.id);
    });
    render();
  });
}

// ---- RENDER ----
function render(){
  destroyChart();
  const app=$('app'),fab=$('fab');
  if(S.view==='projects'){app.innerHTML=vProjects();fab.style.display='flex';}
  else if(S.view==='project'){app.innerHTML=vProject();fab.style.display='flex';}
  else if(S.view==='analytics'){app.innerHTML=vAnalytics();fab.style.display='none';setTimeout(renderChart,60);}
  else if(S.view==='categories'){app.innerHTML=vCategories();fab.style.display='none';}
  else if(S.view==='all'){app.innerHTML=vAll();fab.style.display='flex';}
  else if(S.view==='bills'){app.innerHTML=vBills();fab.style.display='none';}
}

function vProjects(){
  return`<div class="topbar"><h1>Мои проекты</h1><div style="display:flex;gap:2px">
    <button class="tbtn" onclick="go('all')">📋</button>
    <button class="tbtn" onclick="go('analytics')">📊</button>
    <button class="tbtn" onclick="go('bills')">🧾</button>
    <button class="tbtn" onclick="go('categories')">🏷️</button>
  </div></div>
  <div class="section">
    <div class="tbar"><span class="tbar-lbl">Всего расходов</span><span class="tbar-val">${fmt(atotal())}</span></div>
    ${D.projects.map(p=>`
    <div class="card" onclick="openProj('${p.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:15px;font-weight:600"><span class="dot" style="background:${p.color};margin-right:6px"></span>${p.name}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="${p.type==='investor'?'type-inv':'type-per'}">${p.type==='investor'?'Инв.':'Личный'}</span>
          <button onclick="event.stopPropagation();editProj('${p.id}')" style="background:none;border:none;font-size:16px;cursor:pointer;color:#C7C7CC;padding:2px 5px">✏️</button>
        </div>
      </div>
      <div style="font-size:20px;font-weight:700;color:${p.color}">${fmt(ptotal(p.id))}</div>
      <div style="font-size:13px;color:#8E8E93;margin-top:2px">${D.expenses.filter(e=>e.pid===p.id).length} расходов${p.type==='investor'&&p.investors?.length?' · '+p.investors.length+' уч.':''}</div>
    </div>`).join('')}
    <div class="card" style="text-align:center;color:#34C759;font-weight:600;border:2px dashed #D1FAE5" onclick="newProj()">+ Новый проект</div>
  </div>`;
}

function vProject(){
  const p=proj(S.pid);
  let ex=D.expenses.filter(e=>e.pid===p.id);
  if(S.q)ex=ex.filter(e=>(e.note||'').toLowerCase().includes(S.q.toLowerCase())||cat(e.cid).name.toLowerCase().includes(S.q.toLowerCase()));
  if(S.fcat!=='all')ex=ex.filter(e=>e.cid===S.fcat);
  if(S.fpay!=='all')ex=ex.filter(e=>(e.payer||'me')===S.fpay);
  ex=sortArr(ex);
  const isInv=p.type==='investor';
  const total=D.expenses.filter(e=>e.pid===p.id).reduce((s,e)=>s+e.amt,0);
  const cats=[...new Set(D.expenses.filter(e=>e.pid===p.id).map(e=>e.cid))];
  const byPay={};D.expenses.filter(e=>e.pid===p.id).forEach(e=>{const k=e.payer||'me';byPay[k]=(byPay[k]||0)+e.amt;});
  const payers=isInv?[{id:'me',name:'Я'},...(p.investors||[])]:[];
  return`
  <div class="topbar">
    <button class="back-btn" onclick="go('projects')">‹ Назад</button>
    <div style="flex:1;text-align:center"><div style="font-size:17px;font-weight:600">${p.name}</div><div class="subtitle">${fmt(total)}</div></div>
    <button class="tbtn" onclick="S.apid='${p.id}';go('analytics')">📊</button>
  </div>
  ${isInv?`<div class="section" style="padding-bottom:4px"><div style="background:#fff;border-radius:14px;padding:10px 14px;display:flex;gap:10px;overflow-x:auto;scrollbar-width:none">
    ${payers.map(inv=>{const a=byPay[inv.id]||0;const col=inv.id==='me'?'#34C759':avc(inv.name);return`<div style="flex-shrink:0;text-align:center;min-width:55px">
      <div class="avatar" style="background:${col};margin:0 auto 3px;width:34px;height:34px;font-size:12px">${inv.id==='me'?'Я':ini(inv.name)}</div>
      <div style="font-size:11px;font-weight:600">${inv.id==='me'?'Я':inv.name.split(' ')[0]}</div>
      <div style="font-size:12px;color:#34C759;font-weight:600">${fmt(a)}</div>
    </div>`;}).join('')}
  </div></div>`:''}
  <div class="section" style="padding-bottom:4px">
    <div style="position:relative;margin-bottom:8px">
      <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#8E8E93;font-size:14px;pointer-events:none">🔍</span>
      <input style="width:100%;padding:9px 12px 9px 34px;border:none;border-radius:12px;font-size:15px;background:#E5E5EA;color:#1C1C1E;outline:none;font-family:inherit" placeholder="Поиск..." value="${S.q}" oninput="S.q=this.value;render()">
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
      <div class="fbar" style="flex:1">
        <button class="fchip ${S.fcat==='all'?'on':''}" onclick="S.fcat='all';render()">Все</button>
        ${cats.map(cid=>{const c=cat(cid);return`<button class="fchip ${S.fcat===cid?'on':''}" onclick="S.fcat='${cid}';render()">${c.icon} ${c.name}</button>`;}).join('')}
      </div>
      <select class="sortsel" onchange="S.sort=this.value;render()">
        ${SORTS.map(o=>`<option value="${o.v}"${S.sort===o.v?' selected':''}>${o.l}</option>`).join('')}
      </select>
    </div>
    ${isInv?`<div class="fbar">
      <button class="fchip ${S.fpay==='all'?'on':''}" onclick="S.fpay='all';render()">Все</button>
      <button class="fchip ${S.fpay==='me'?'on-p':'on'==''?'':'on'}" style="${S.fpay==='me'?'background:#34C759;border-color:#34C759;color:#fff':''}" onclick="S.fpay='me';render()">Я</button>
      ${(p.investors||[]).map(inv=>`<button class="fchip ${S.fpay===inv.id?'on-p':''}" onclick="S.fpay='${inv.id}';render()">${inv.name}</button>`).join('')}
    </div>`:''}
  </div>
  <div style="background:#fff;border-radius:14px;margin:0 16px;padding:0 16px">
    ${ex.length===0?'<div style="text-align:center;padding:32px;color:#8E8E93;font-size:14px">Расходов нет</div>':ex.map(e=>{
      const c=cat(e.cid);const ci=D.categories.findIndex(x=>x.id===e.cid);
      const pr=proj(e.pid);const pn=pname(e.payer,pr);const pc=(e.payer==='me'||!e.payer)?'#34C759':avc(pn);
      return`<div class="exp-row">
        <div class="exp-icon">${c.icon}</div>
        <div class="exp-info">

// ---- CHARTS ----
function destroyChart(){if(chart){chart.destroy();chart=null;}}
function renderChart(){
  const pid=S.apid;
  let ex=pid?D.expenses.filter(e=>e.pid===pid):D.expenses;
  const bycat={};ex.forEach(e=>{bycat[e.cid]=(bycat[e.cid]||0)+e.amt;});
  const cats=Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  const el=$('ch');if(!el||!cats.length)return;
  chart=new Chart(el,{type:'doughnut',data:{
    labels:cats.map(([cid])=>cat(cid).name),
    datasets:[{data:cats.map(([,v])=>v),backgroundColor:cats.map(([cid])=>{const i=D.categories.findIndex(c=>c.id===cid);return cc(i);}),borderWidth:3,borderColor:'#fff'}]
  },options:{responsive:true,cutout:'62%',plugins:{legend:{position:'bottom',labels:{font:{size:12},padding:10,boxWidth:13}},
    tooltip:{callbacks:{label:ctx=>{const v=ctx.raw;const t=ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);return ctx.label+': '+fmt(v)+' ('+Math.round(v/t*100)+'%)';}}}}
  }});
}

  document.body.appendChild(ov);
}

async function saveExp(){
  syncAmt();
  if(!TF.pid||!TF.amt||parseFloat(TF.amt)<=0)return;
  const e={pid:TF.pid,cid:TF.cid||D.categories[0]?.id,amt:parseFloat(TF.amt),note:TF.note,payer:TF.payer||'me',created_at:new Date().toISOString().split('T')[0],adv:TF.adv,adv_total:TF.adv&&TF.total?parseFloat(TF.total):null,party:TF.party||'',adv_status:TF.adv?'pending':null};
  closeModal();
  await addDoc(collection(db,'expenses'),e);
}

        <button onclick="addInv()" style="padding:10px 14px;background:#5856D6;border:none;border-radius:12px;color:#fff;font-size:16px;cursor:pointer;font-family:inherit">+</button>
      </div>
      ${editPid&&NP.investors.length?`<div style="margin-top:12px">
        <div class="lbl" style="margin-bottom:6px">Ссылки для инвесторов</div>
        ${NP.investors.map(inv=>`<div style="margin-bottom:10px">
          <div style="font-size:13px;font-weight:600;margin-bottom:4px">${inv.name}</div>
          <div style="background:#F2F2F7;border-radius:10px;padding:10px;font-size:11px;font-family:monospace;word-break:break-all">${invLink(editPid,inv.id)}</div>
          <button onclick="copyTxt('${invLink(editPid,inv.id)}')" style="width:100%;padding:10px;background:#F2F2F7;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:#007AFF;font-family:inherit;margin-top:6px">📋 Копировать ссылку</button>
        </div>`).join('')}
      </div>`:''}
    </div>`:''}
    ${editPid?`<button class="del-btn" style="width:100%;padding:13px;font-size:15px;border-radius:14px;margin-bottom:8px" onclick="delProj('${editPid}')">Удалить проект</button>`:''}
    <button class="save-btn" onclick="saveProj()">Сохранить</button>
  `);
  setTimeout(()=>{const i=$('pni');if(i)i.focus();},80);
}

function addInv(){const i=$('invnm');if(!i||!i.value.trim())return;NP.investors.push({id:'inv_'+Date.now(),name:i.value.trim()});showProjModal();}
function invLink(pid,iid){return location.href.split('?')[0]+'?project='+pid+'&investor='+iid;}
function copyTxt(t){navigator.clipboard?navigator.clipboard.writeText(t).then(()=>alert('Ссылка скопирована!')):prompt('Скопируйте:',t);}

async function saveProj(){
  const i=$('pni');if(i)NP.name=i.value.trim();
  if(!NP.name)return;
  const p={name:NP.name,color:NP.color,type:NP.type,investors:NP.type==='investor'?NP.investors:[]};
  closeModal();
  if(editPid){await updateDoc(doc(db,'projects',editPid),p);const i=D.projects.findIndex(x=>x.id===editPid);if(i>=0)D.projects[i]={...D.projects[i],...p};}
  else{const r=await addDoc(collection(db,'projects'),p);D.projects.push({id:r.id,...p});}
  render();
}
async function delProj(id){
  closeModal();
  await deleteDoc(doc(db,'projects',id));
  D.projects=D.projects.filter(p=>p.id!==id);
  const toD=D.expenses.filter(e=>e.pid===id);
  for(const e of toD)await deleteDoc(doc(db,'expenses',e.id));
  D.expenses=D.expenses.filter(e=>e.pid!==id);
  go('projects');
}

// Category modals
function newCat(){TC={name:'',icon:'📌'};editCid=null;showCatModal();}
function editCat(id){const c=D.categories.find(x=>x.id===id);if(!c)return;TC={name:c.name,icon:c.icon};editCid=id;showCatModal();}
function showCatModal(){
  modal(`<div class="modal-title">${editCid?'Редактировать':'Новая категория'}</div>
    <div class="form-group"><label class="lbl">Название</label>
      <input id="cni" class="inp" type="text" value="${TC.name}" oninput="TC.name=this.value" placeholder="Название...">
    </div>
    <div class="form-group"><label class="lbl">Иконка — <span id="cic">${TC.icon}</span></label>
      <div class="cat-icon-grid">${ICONS.map(ic=>`<button class="icon-btn ${TC.icon===ic?'on':''}" onclick="TC.icon='${ic}';$('cic').textContent='${ic}';document.querySelectorAll('.icon-btn').forEach(b=>b.classList.toggle('on',b.textContent==='${ic}'))">${ic}</button>`).join('')}</div>
    </div>
    <button class="save-btn" onclick="saveCat()">Сохранить</button>
  `);
  setTimeout(()=>{const i=$('cni');if(i)i.focus();},80);
}
async function saveCat(){
  const i=$('cni');if(i)TC.name=i.value.trim();
  if(!TC.name)return;
  closeModal();
  if(editCid){await updateDoc(doc(db,'categories',editCid),{name:TC.name,icon:TC.icon});const i=D.categories.findIndex(x=>x.id===editCid);if(i>=0)D.categories[i]={...D.categories[i],name:TC.name,icon:TC.icon};}
  else{const r=await addDoc(collection(db,'categories'),{name:TC.name,icon:TC.icon});D.categories.push({id:r.id,name:TC.name,icon:TC.icon});}
  render();
}
async function delCat(id){
  const fb=D.categories.find(c=>c.name==='Прочее'&&c.id!==id)||D.categories.find(c=>c.id!==id);
  if(fb){const toU=D.expenses.filter(e=>e.cid===id);for(const e of toU){await updateDoc(doc(db,'expenses',e.id),{cid:fb.id});e.cid=fb.id;}}
  await deleteDoc(doc(db,'categories',id));D.categories=D.categories.filter(c=>c.id!==id);render();
}

async function delExp(id){await deleteDoc(doc(db,'expenses',id));}
async function closeBill(id){
  await updateDoc(doc(db,'expenses',id),{adv_status:'done'});
  const e=D.expenses.find(x=>x.id===id);if(e)e.adv_status='done';
  render();
}

function exportCSV(){
  const rows=[['Дата','Проект','Категория','Кто платит','Сумма','Комментарий','Аванс','Общая сумма','Остаток','Статус']];
  D.expenses.slice().sort((a,b)=>b._t-a._t).forEach(e=>{
    const pr=proj(e.pid);const c=cat(e.cid);const pn=pname(e.payer,pr);
    rows.push([e.created_at,pr.name,c.name,pn,e.amt,'"'+(e.note||'').replace(/"/g,'""')+'"',e.adv?'Да':'Нет',e.adv_total||'',e.adv?(e.adv_total||0)-e.amt:'',e.adv_status||'']);
  });
  const csv='\uFEFF'+rows.map(r=>r.join(';')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='расходы.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function go(view){
  if(view==='project'&&!S.pid)view='projects';
  if(view==='analytics'&&!S.apid)S.apid=null;
  S.view=view;S.q='';S.fcat='all';S.fpay='all';
  render();
}
function openProj(id){S.pid=id;S.apid=id;go('project');}

// INVESTOR VIEW
async function loadInvView(){
  try{
    const[ps,cs,es]=await Promise.all([getDocs(collection(db,'projects')),getDocs(collection(db,'categories')),getDocs(collection(db,'expenses'))]);
    const pr=ps.docs.map(d=>({id:d.id,...d.data()})).find(p=>p.id===PROJ_TOKEN);
    if(!pr){$('app').innerHTML='<div class="loading">Проект не найден</div>';return;}
    const inv=pr.investors?.find(i=>i.id===INV_TOKEN);
    if(!inv){$('app').innerHTML='<div class="loading">Нет доступа</div>';return;}
    D.projects=[pr];D.categories=cs.docs.map(d=>({id:d.id,...d.data()}));
    D.expenses=es.docs.map(d=>({id:d.id,...d.data(),_t:d.data().created_at?new Date(d.data().created_at).getTime():0})).filter(e=>e.pid===PROJ_TOKEN);
    renderInvView(pr,inv);
    onSnapshot(collection(db,'expenses'),snap=>{
      D.expenses=snap.docs.map(d=>({id:d.id,...d.data(),_t:d.data().created_at?new Date(d.data().created_at).getTime():0})).filter(e=>e.pid===PROJ_TOKEN);
      renderInvView(pr,inv);
    });
  }catch(e){$('app').innerHTML='<div class="loading">Ошибка загрузки</div>';}
}

function renderInvView(pr,inv){
  const ex=D.expenses;const total=ex.reduce((s,e)=>s+e.amt,0);
  const byPay={};ex.forEach(e=>{const k=e.payer||'me';byPay[k]=(byPay[k]||0)+e.amt;});
  const payers=[{id:'me',name:'Руководитель'},...(pr.investors||[])];
  $('app').innerHTML=`
  <div class="topbar"><h1 style="flex:1">${pr.name}</h1><span class="type-inv">Инвестор</span></div>
  <div class="section">
    <div class="tbar"><span class="tbar-lbl">Общие расходы</span><span class="tbar-val">${fmt(total)}</span></div>
    <div style="font-size:12px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px">Участники</div>
    <div style="background:#fff;border-radius:14px;padding:0 16px;margin-bottom:14px">
      ${payers.map(p=>{const a=byPay[p.id]||0;const pct=total?Math.round(a/total*100):0;const col=p.id==='me'?'#34C759':avc(p.name);return`<div class="inv-row">
        <div style="display:flex;align-items:center;gap:10px;flex:1">
          <div class="avatar" style="background:${col}">${p.id==='me'?'Р':ini(p.name)}</div>
          <div><div style="font-size:15px;font-weight:600">${p.name}</div><div style="font-size:12px;color:#8E8E93">${pct}%</div></div>
        </div>
        <div style="font-size:17px;font-weight:700">${fmt(a)}</div>
      </div>`;}).join('')}
    </div>
    <div style="font-size:12px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px">Все расходы</div>
    <div style="background:#fff;border-radius:14px;padding:0 16px">
      ${ex.length===0?'<div style="text-align:center;padding:28px;color:#8E8E93">Расходов пока нет</div>':
      ex.slice().sort((a,b)=>b._t-a._t).map(e=>{
        const c=cat(e.cid);const ci=D.categories.findIndex(x=>x.id===e.cid);
        const pn=e.payer==='me'||!e.payer?'Руководитель':(pr.investors?.find(i=>i.id===e.payer)?.name||'—');
        const pc=(e.payer==='me'||!e.payer)?'#34C759':avc(pn);
        return`<div class="exp-row">
          <div class="exp-icon">${c.icon}</div>
          <div class="exp-info">
            <div class="exp-title">${e.note||c.name}</div>
            <div class="exp-sub"><span class="badge ${bi(ci)}">${c.name}</span> · <span style="display:inline-flex;align-items:center;gap:3px"><span style="width:7px;height:7px;border-radius:50%;background:${pc};display:inline-block"></span>${pn}</span> · ${dt(e.created_at)}</div>
          </div>
          <span style="font-size:16px;font-weight:600;flex-shrink:0">${fmt(e.amt)}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// expose globals
Object.assign(window,{openAddExpense,showAddModal,selPid,selCid,selPayer,saveExp,newProj,editProj,showProjModal,saveProj,delProj,addInv,newCat,editCat,showCatModal,saveCat,delCat,delExp,closeBill,exportCSV,go,openProj,copyTxt,closeModal,S,TF,NP,TC,$});

if(IS_INV){$('fab').style.display='none';loadInvView();}
else{
  loadAll().then(()=>{subscribe();render();}).catch(err=>{
    $('app').innerHTML=`<div class="loading" style="gap:16px;padding:24px;text-align:center">
      <div style="font-size:36px">⚠️</div>
      <div style="font-size:17px;font-weight:600;color:#1C1C1E">Ошибка подключения</div>
      <div style="font-size:14px;color:#8E8E93;line-height:1.6">Зайдите в Firebase Console →<br>Firestore Database → Rules<br>и нажмите Publish</div>
      <div class="err-box">allow read, write: if true;</div>
      <button onclick="location.reload()" style="background:#34C759;border:none;border-radius:12px;padding:13px 24px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit">Обновить</button>
    </div>`;
    $('fab').style.display='none';
    console.error(err);
  });
}
