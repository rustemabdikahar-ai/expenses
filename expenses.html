<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Расходы">
<title>Расходы</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F5F7;--card:#fff;--text:#1C1C1E;--text2:#6E6E73;--text3:#AEAEB2;
  --border:rgba(0,0,0,0.08);--green:#30D158;--green2:#25A244;--blue:#0A84FF;
  --purple:#BF5AF2;--orange:#FF9F0A;--red:#FF453A;--shadow:0 2px 20px rgba(0,0,0,0.08);
  --r:16px;--r2:12px;--r3:24px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none}
.app{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
.page{padding:0 0 100px;animation:fadein 0.2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* TOPBAR */
.topbar{padding:16px 20px 12px;display:flex;align-items:center;gap:12px;background:var(--bg);position:sticky;top:0;z-index:10}
.topbar-title{font-size:28px;font-weight:700;letter-spacing:-0.5px;flex:1}
.topbar-sub{font-size:13px;color:var(--text2);margin-top:1px}
.back{background:none;border:none;cursor:pointer;color:var(--blue);font-size:17px;display:flex;align-items:center;gap:4px;padding:0;font-family:inherit}
.icon-wrap{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;border:none;flex-shrink:0}
.icon-wrap:active{opacity:0.7}

/* CARDS */
.card{background:var(--card);border-radius:var(--r);padding:16px;margin:0 16px 12px;box-shadow:var(--shadow)}
.card-sm{padding:12px 16px}

/* PROJECT CARDS */
.proj-card{background:var(--card);border-radius:20px;margin:0 16px 14px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform 0.15s}
.proj-card:active{transform:scale(0.98)}
.proj-card-top{padding:18px 18px 14px;display:flex;align-items:flex-start;justify-content:space-between}
.proj-card-bottom{padding:10px 18px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.proj-name{font-size:18px;font-weight:700;letter-spacing:-0.3px;margin-bottom:4px}
.proj-amount{font-size:26px;font-weight:800;letter-spacing:-0.8px}
.proj-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.badge-inv{background:rgba(191,90,242,0.12);color:var(--purple)}
.badge-per{background:rgba(48,209,88,0.12);color:var(--green2)}

/* STATS ROW */
.stats-row{display:flex;gap:10px;margin:0 16px 14px}
.stat-card{flex:1;background:var(--card);border-radius:var(--r2);padding:14px;box-shadow:var(--shadow)}
.stat-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:4px}
.stat-value{font-size:20px;font-weight:700;letter-spacing:-0.5px}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin-bottom:8px}
.sec-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.sec-action{font-size:14px;color:var(--blue);font-weight:500;cursor:pointer;background:none;border:none;font-family:inherit}

/* EXPENSE ROWS */
.exp-list{background:var(--card);border-radius:var(--r);margin:0 16px;box-shadow:var(--shadow);overflow:hidden}
.exp-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:default}
.exp-item:last-child{border-bottom:none}
.exp-ico{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.exp-body{flex:1;min-width:0}
.exp-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-meta{font-size:12px;color:var(--text2);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.exp-amt{font-size:16px;font-weight:700;text-align:right;flex-shrink:0}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.p0{background:#D1FAE5;color:#065F46}.p1{background:#DBEAFE;color:#1E3A8A}
.p2{background:#FEF3C7;color:#78350F}.p3{background:#FCE7F3;color:#831843}
.p4{background:#EDE9FE;color:#4C1D95}.p5{background:#F3F4F6;color:#1F2937}
.p6{background:#D1FAE5;color:#065F46}.p7{background:#FDE8D8;color:#7C2D12}

/* PAYER DOT */
.pdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

/* FAB */
.fab{position:fixed;bottom:28px;right:20px;width:58px;height:58px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:28px;font-weight:300;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:20;box-shadow:0 4px 24px rgba(48,209,88,0.4);transition:transform 0.15s}
.fab:active{transform:scale(0.92)}
.fab.show{display:flex}

/* BOTTOM SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s}
.sheet-bg.open{opacity:1;pointer-events:all}
.sheet{background:var(--card);border-radius:28px 28px 0 0;width:100%;max-width:430px;padding:12px 20px 40px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1)}
.sheet-bg.open .sheet{transform:none}
.sheet-handle{width:40px;height:5px;background:var(--border);border-radius:3px;margin:0 auto 18px}
.sheet-title{font-size:20px;font-weight:700;margin-bottom:18px;letter-spacing:-0.3px}
.sheet-section{margin-bottom:18px}
.sheet-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px;display:block}
.inp{width:100%;padding:13px 15px;border:1.5px solid var(--border);border-radius:var(--r2);font-size:16px;background:var(--card);color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;transition:border-color 0.15s}
.inp:focus{border-color:var(--green)}
.inp-big{font-size:24px;font-weight:700;letter-spacing:-0.5px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:500;background:var(--card);color:var(--text2);cursor:pointer;font-family:inherit;transition:all 0.12s;white-space:nowrap}
.chip.on{background:var(--green);border-color:var(--green);color:#fff}
.chip.on-p{background:var(--purple);border-color:var(--purple);color:#fff}
.chip.on-o{background:var(--orange);border-color:var(--orange);color:#fff}
.chip.on-b{background:var(--blue);border-color:var(--blue);color:#fff}
.proj-opt{padding:14px 15px;border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;margin-bottom:8px;display:flex;align-items:center;gap:12px;font-family:inherit;background:var(--card);color:var(--text);width:100%;text-align:left;transition:all 0.12s}
.proj-opt.on{border-color:var(--green);background:rgba(48,209,88,0.06)}
.proj-opt-name{font-size:15px;font-weight:600}
.btn-main{width:100%;padding:16px;background:var(--green);border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-0.2px;transition:opacity 0.15s;margin-top:8px}
.btn-main:active{opacity:0.85}
.btn-main:disabled{background:var(--text3);cursor:not-allowed}
.btn-del{width:100%;padding:14px;background:rgba(255,69,58,0.08);border:none;border-radius:14px;color:var(--red);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:8px}
.btn-ghost{width:100%;padding:14px;background:rgba(0,0,0,0.04);border:none;border-radius:14px;color:var(--blue);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}

/* FILTER BAR */
.fbar{display:flex;gap:7px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.fbar::-webkit-scrollbar{display:none}
.fc{padding:7px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:500;background:var(--card);color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:all 0.12s}
.fc.on{background:var(--text);border-color:var(--text);color:#fff}
.fc.on-p{background:var(--purple);border-color:var(--purple);color:#fff}

/* SORT */
.sortsel{padding:7px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:500;background:var(--card);color:var(--text);outline:none;cursor:pointer;font-family:inherit;-webkit-appearance:none;flex-shrink:0}

/* PARTICIPANTS BAR */
.part-bar{display:flex;gap:0;overflow-x:auto;padding:14px 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch;background:var(--card);border-radius:var(--r);margin:0 16px 12px;box-shadow:var(--shadow)}
.part-bar::-webkit-scrollbar{display:none}
.part-item{flex-shrink:0;text-align:center;padding:0 12px;border-right:1px solid var(--border)}
.part-item:last-child{border-right:none}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;margin:0 auto 5px}
.part-name{font-size:11px;font-weight:600;color:var(--text2)}
.part-amt{font-size:13px;font-weight:700;color:var(--green2);margin-top:1px}

/* BILLS */
.bill-card{background:var(--card);border-radius:var(--r);margin:0 16px 10px;box-shadow:var(--shadow);overflow:hidden}
.bill-accent{height:4px}
.bill-body{padding:14px 16px}
.bill-name{font-size:16px;font-weight:700;margin-bottom:4px}
.bill-meta{font-size:12px;color:var(--text2);margin-bottom:10px}
.bill-nums{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px}
.prog-bg{background:rgba(0,0,0,0.06);border-radius:4px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:var(--green);transition:width 0.4s}
.bill-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(0,0,0,0.02);border-top:1px solid var(--border)}

/* ANALYTICS */
.anl-card{background:var(--card);border-radius:var(--r);margin:0 16px 10px;box-shadow:var(--shadow);padding:16px}
.anl-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.anl-row:last-child{border-bottom:none}
.anl-bar-wrap{flex:1;margin:0 12px;background:rgba(0,0,0,0.06);border-radius:4px;height:6px;overflow:hidden;min-width:40px}
.anl-bar{height:100%;border-radius:4px}

/* COLOR DOTS */
.cdot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}

/* CAT ICON GRID */
.icon-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.icon-opt{width:44px;height:44px;border:1.5px solid var(--border);border-radius:14px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--card)}
.icon-opt.on{border-color:var(--green);background:rgba(48,209,88,0.08)}

/* INVESTOR LINK */
.inv-link-box{background:rgba(0,0,0,0.04);border-radius:var(--r2);padding:11px 13px;font-size:12px;font-family:monospace;word-break:break-all;color:var(--text2);margin-top:6px;line-height:1.5}
.copy-btn{width:100%;padding:11px;background:rgba(10,132,255,0.08);border:none;border-radius:var(--r2);color:var(--blue);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:14px;line-height:1.5}

/* COLORS */
.color-row{display:flex;gap:10px;flex-wrap:wrap}
.color-opt{width:36px;height:36px;border-radius:50%;cursor:pointer;transition:transform 0.12s;border:3px solid transparent}
.color-opt.on{border-color:var(--text);transform:scale(1.15)}

/* ADV TOGGLE */
.adv-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;background:rgba(0,0,0,0.03);border-radius:var(--r2);cursor:pointer}
.adv-lbl{font-size:14px;font-weight:600;color:var(--text)}
.adv-sub{font-size:12px;color:var(--text2);margin-top:1px}
.toggle-pill{width:44px;height:26px;border-radius:13px;background:var(--text3);position:relative;transition:background 0.2s;flex-shrink:0}
.toggle-pill.on{background:var(--green)}
.toggle-pill::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
.toggle-pill.on::after{transform:translateX(18px)}

/* SEARCH */
.search-wrap{position:relative;margin:0 16px 10px}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);pointer-events:none}
.search-inp{width:100%;padding:11px 14px 11px 38px;border:none;border-radius:var(--r2);font-size:15px;background:rgba(0,0,0,0.06);color:var(--text);outline:none;font-family:inherit}

/* INV VIEW */
.inv-hero{background:linear-gradient(135deg,#1C1C1E 0%,#3A3A3C 100%);margin:0 16px 14px;border-radius:20px;padding:20px;color:#fff}
.inv-hero-label{font-size:12px;font-weight:600;opacity:0.6;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.inv-hero-amount{font-size:36px;font-weight:800;letter-spacing:-1px}

canvas{width:100%!important;max-height:220px}
</style>
</head>
<body>
<div class="app">
  <div id="app"><div class="loading"><div class="spin"></div><span style="color:var(--text2);font-size:15px">Загрузка...</span></div></div>
  <button class="fab" id="fab" onclick="openAddExp(null)">+</button>
</div>

<!-- BOTTOM SHEET -->
<div class="sheet-bg" id="sheet-bg" onclick="sheetClose(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-content"></div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,addDoc,updateDoc,deleteDoc,doc,getDocs,onSnapshot}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB={apiKey:"AIzaSyAaDOtqcnqQbyxttj5y8IYAUHxMTsrspj4",authDomain:"expenses-app-a4565.firebaseapp.com",projectId:"expenses-app-a4565",storageBucket:"expenses-app-a4565.firebasestorage.app",messagingSenderId:"918179761678",appId:"1:918179761678:web:85968596424ed5cc1bb65f"};
const fbApp=initializeApp(FB);
const db=getFirestore(fbApp);

const CURRENCIES={
  'AED':{name:'Дирхам',flag:'🇦🇪',sym:'AED'},
  'USD':{name:'Доллар',flag:'💵',sym:'$'},
  'EUR':{name:'Евро',flag:'💶',sym:'€'},
  'CNY':{name:'Юань',flag:'🇨🇳',sym:'¥'},
  'RUB':{name:'Рубль',flag:'🇷🇺',sym:'₽'}
};
const COLORS=['#30D158','#0A84FF','#FF6B35','#BF5AF2','#FF375F','#FF9F0A','#5AC8FA','#FF453A','#64D2FF','#FFD60A'];
const ICONS=['📦','🏠','💼','📢','🛒','🚗','💡','🔧','📌','🍔','☕','🎯','🏥','📱','✈️','🎁','💰','🖥️','👗','🏋️','🎪','🏗️','🌿','🔑','📐'];
const SORTS=[{v:'nd',l:'Новые'},{v:'od',l:'Старые'},{v:'hi',l:'Дороже'},{v:'lo',l:'Дешевле'},{v:'cat',l:'Категория'}];

const P=new URLSearchParams(location.search);
const IS_INV=!!(P.get('investor')&&P.get('project'));

let D={projects:[],categories:[],expenses:[]};
let S={view:'projects',pid:null,modal:null,q:'',fcat:'all',fpay:'all',sort:'nd',apid:null};
let TF={pid:null,cid:null,amt:'',note:'',payer:'me',adv:false,total:'',party:''};
let TC={name:'',icon:'📌'};
let NP={color:COLORS[0],type:'personal',name:'',owner:'',investors:[]};
let editPid=null,editCid=null,myChart=null;

const $=id=>document.getElementById(id);
const fmt=n=>(+n||0).toLocaleString('ru-RU')+'₸';
const dt=d=>new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
const getcat=(id,pid)=>{
  if(pid){const p=getproj(pid);const oc=(p.own_cats||[]).find(c=>c.id===id);if(oc)return oc;}
  // search all projects own_cats
  for(const p of D.projects){const oc=(p.own_cats||[]).find(c=>c.id===id);if(oc)return oc;}
  return D.categories.find(c=>c.id===id)||{name:'Прочее',icon:'📌'};
};
const getproj=id=>D.projects.find(p=>p.id===id)||{name:'—',color:'#8E8E93',type:'personal',investors:[]};
const pi=i=>['p0','p1','p2','p3','p4','p5','p6','p7'][i%8];
const cc=i=>COLORS[((i%COLORS.length)+COLORS.length)%COLORS.length];
const ccId=id=>{let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))%COLORS.length;return COLORS[h];};
const avc=s=>{const c=COLORS;let h=0;for(const x of s)h=(h*31+x.charCodeAt(0))%c.length;return c[h];};
const ini=s=>s.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const pname=(pid,pr)=>pid==='me'||!pid?(pr?.owner||'Руководитель'):(pr?.investors?.find(i=>i.id===pid)?.name||'—');
const ptotal=id=>D.expenses.filter(e=>e.pid===id).reduce((s,e)=>s+e.amt,0);
const c2total=(pid,cur2)=>D.expenses.filter(e=>e.pid===pid&&e.c2_amt).reduce((s,e)=>s+(+e.c2_amt||0),0);
const atotal=()=>D.expenses.reduce((s,e)=>s+e.amt,0);

// Get categories for a project: global selected + project-specific
const projCats=pid=>{
  const p=getproj(pid);
  // Project-specific categories stored in p.own_cats array
  const ownCats=(p.own_cats||[]);
  if(p.cats&&p.cats.length>0){
    const globals=D.categories.filter(c=>p.cats.includes(c.id));
    return [...globals,...ownCats];
  }
  return [...D.categories,...ownCats];
};

function sortArr(arr){
  const a=arr.slice();
  if(S.sort==='nd')return a.sort((x,y)=>(y._t||0)-(x._t||0));
  if(S.sort==='od')return a.sort((x,y)=>(x._t||0)-(y._t||0));
  if(S.sort==='hi')return a.sort((x,y)=>y.amt-x.amt);
  if(S.sort==='lo')return a.sort((x,y)=>x.amt-y.amt);
  if(S.sort==='cat')return a.sort((x,y)=>getcat(x.cid).name.localeCompare(getcat(y.cid).name,'ru'));
  return a;
}

// FIREBASE
async function loadAll(){
  const[ps,cs,es]=await Promise.all([getDocs(collection(db,'projects')),getDocs(collection(db,'categories')),getDocs(collection(db,'expenses'))]);
  D.projects=ps.docs.map(d=>({id:d.id,...d.data()}));
  D.categories=cs.docs.map(d=>({id:d.id,...d.data()}));
  D.expenses=es.docs.map(d=>({id:d.id,...d.data(),_t:d.data().created_at?new Date(d.data().created_at).getTime():0}));
  if(!D.categories.length)await seedCats();
}
async function seedCats(){
  const cats=[{name:'Закуп',icon:'📦'},{name:'Аренда',icon:'🏠'},{name:'Зарплата',icon:'💼'},{name:'Маркетинг',icon:'📢'},{name:'Продукты',icon:'🛒'},{name:'Транспорт',icon:'🚗'},{name:'Коммуналка',icon:'💡'},{name:'Оборудование',icon:'🔧'},{name:'Прочее',icon:'📌'}];
  for(const c of cats){const r=await addDoc(collection(db,'categories'),c);D.categories.push({id:r.id,...c});}
}
function subscribe(){
  onSnapshot(collection(db,'expenses'),snap=>{
    snap.docChanges().forEach(ch=>{
      const d={id:ch.doc.id,...ch.doc.data(),_t:ch.doc.data().created_at?new Date(ch.doc.data().created_at).getTime():0};
      if(ch.type==='added'&&!D.expenses.find(e=>e.id===d.id))D.expenses.push(d);
      else if(ch.type==='modified'){const i=D.expenses.findIndex(e=>e.id===d.id);if(i>=0)D.expenses[i]=d;}
      else if(ch.type==='removed')D.expenses=D.expenses.filter(e=>e.id!==ch.doc.id);
    });
    render();
  });
}

// RENDER
function render(){
  destroyChart();
  const fab=$('fab');
  if(S.view==='projects'){$('app').innerHTML=vProjects();fab.className='fab show';}

  else if(S.view==='categories'){$('app').innerHTML=vCategories();fab.className='fab';}
  else if(S.view==='all'){$('app').innerHTML=vAll();fab.className='fab show';}

}

async function getRateForDate(cur2,date){
  try{
    const base=cur2.toLowerCase();
    const res=await fetch(`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${date}/v1/currencies/${base}.json`);
    if(res.ok){const d=await res.json();const rate=d?.[base]?.kzt;if(rate)return rate;}
    // fallback latest
    const res2=await fetch(`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/${base}.json`);
    if(res2.ok){const d2=await res2.json();return d2?.[base]?.kzt||null;}
  }catch(e){}
  return null;
}

async function autoConvertToC2(){
  // KZT entered → convert to C2
  const sp=TF.pid?getproj(TF.pid):null;
  if(!sp||!sp.multi)return;
  const ai=document.getElementById('ai');
  if(ai)TF.amt=ai.value;
  if(!TF.amt||parseFloat(TF.amt)<=0)return;
  const dateInp=document.getElementById('date-inp');
  const date=dateInp?dateInp.value:new Date().toISOString().split('T')[0];
  const rateInfo=document.getElementById('rate-info');
  if(rateInfo)rateInfo.innerHTML='⏳ Загружаю курс...';
  const rate=await getRateForDate(sp.currency2,date);
  if(rate){
    TF.rate=rate;
    const c2=Math.round((parseFloat(TF.amt)/rate)*100)/100;
    TF.c2_amt=String(c2);
    const c2inp=document.getElementById('c2i');
    if(c2inp)c2inp.value=c2;
    if(rateInfo)rateInfo.innerHTML=`Курс: 1 ${sp.currency2} = ${rate.toFixed(2)} ₸`;
  } else {
    if(rateInfo)rateInfo.innerHTML='⚠️ Не удалось загрузить курс';
  }
  updSaveBtn();
}

async function autoConvertToKZT(){
  // C2 entered → convert to KZT
  const sp=TF.pid?getproj(TF.pid):null;
  if(!sp||!sp.multi)return;
  const c2inp=document.getElementById('c2i');
  if(c2inp)TF.c2_amt=c2inp.value;
  if(!TF.c2_amt||parseFloat(TF.c2_amt)<=0)return;
  const dateInp=document.getElementById('date-inp');
  const date=dateInp?dateInp.value:new Date().toISOString().split('T')[0];
  const rateInfo=document.getElementById('rate-info');
  if(rateInfo)rateInfo.innerHTML='⏳ Загружаю курс...';
  const rate=await getRateForDate(sp.currency2,date);
  if(rate){
    TF.rate=rate;
    const kzt=Math.round(parseFloat(TF.c2_amt)*rate);
    TF.amt=String(kzt);
    const ai=document.getElementById('ai');
    if(ai)ai.value=kzt;
    if(rateInfo)rateInfo.innerHTML=`Курс: 1 ${sp.currency2} = ${rate.toFixed(2)} ₸`;
  } else {
    if(rateInfo)rateInfo.innerHTML='⚠️ Не удалось загрузить курс. Введите ₸ вручную';
  }
  updSaveBtn();
}

function parseAmount(str){
  if(!str)return 0;
  return parseFloat(str.replace(/[^0-9]/g,''))||0;
}

function parseDate(str){
  if(!str||!str.trim())return null;
  str=str.trim();
  // formats: 20.06.2025, 02.07, 20*07
  const clean=str.replace('*','.');
  const parts=clean.split('.');
  if(parts.length>=2){
    const d=parts[0].padStart(2,'0');
    const m=parts[1].padStart(2,'0');
    const y=parts.length>=3?parts[2]:'2025';
    return `${y}-${m}-${d}`;
  }
  return null;
}

window._csvRows=[];
function buildUnmatched(unmatchedRows, rows){
  let html='<div style="margin-bottom:8px"><div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px">Назначьте категорию вручную</div>';
  unmatchedRows.slice(0,20).forEach(r=>{
    const idx=rows.indexOf(r);
    const opts=D.categories.map(c=>'<option value="'+c.id+'">'+c.icon+' '+c.name+'</option>').join('');
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 10px;background:rgba(0,0,0,0.03);border-radius:10px">';
    html+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+r.name+'</div>';
    html+='<div style="font-size:11px;color:var(--text2)">'+r.date+' · '+fmt(r.amt)+'</div></div>';
    html+='<select onchange="assignCat('+idx+',this.value)" style="padding:5px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:var(--card);color:var(--text);outline:none;font-family:inherit;max-width:110px;-webkit-appearance:none"><option value="">Прочее</option>'+opts+'</select></div>';
  });
  if(unmatchedRows.length>20)html+='<div style="font-size:12px;color:var(--text2);text-align:center;padding:6px">+ ещё '+(unmatchedRows.length-20)+' записей</div>';
  html+='</div>';
  return html;
}

function previewCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    const lines=text.split(/\r?\n/);
    const rows=[];
    let lastDate=null;
    for(const line of lines){
      const cols=line.split(',');
      const dateRaw=cols[0]?.trim();
      const name=cols[1]?.trim();
      const amtRaw=cols[2]?.trim();
      if(!name||!amtRaw)continue;
      const amt=parseAmount(amtRaw);
      if(!amt||amt<=0)continue;
      const date=parseDate(dateRaw)||lastDate;
      if(dateRaw&&parseDate(dateRaw))lastDate=parseDate(dateRaw);
      if(!date)continue;
      rows.push({date,name,amt});
    }
    window._csvRows=rows;
    // Auto-detect categories
    let matched=0,unmatched=0;
    rows.forEach(r=>{const d=detectCategory(r.name);if(d){matched++;r._detectedCat=d;}else unmatched++;});
    const prev=document.getElementById('import-preview');
    const btn=document.getElementById('import-btn');
    if(prev){
      const unmatchedRows=rows.filter(r=>!r._detectedCat);
      prev.innerHTML=`
        <div style="background:rgba(48,209,88,0.08);border-radius:var(--r2);padding:12px 14px;margin-bottom:10px">
          <div style="font-size:14px;font-weight:700;color:var(--green2);margin-bottom:4px">✓ Найдено ${rows.length} записей</div>
          <div style="font-size:13px;color:var(--text2)">🟢 Категория определена: <b>${matched}</b> · 🟡 Не определено: <b>${unmatched}</b></div>
        </div>
        ${unmatchedRows.length?buildUnmatched(unmatchedRows,rows):''}
      `;
    }
    if(btn&&rows.length>0)btn.style.display='block';
  };
  reader.readAsText(file,'UTF-8');
}

// Smart category detection by keywords
function detectCategory(name){
  const n=name.toLowerCase().trim();
  const rules=[
    // Зарплата / люди
    {cat:'Зарплата',keys:['аванс дима','расчет дима','дима','абыл','темир','мурат','илья','ахун','ахаун','зарплата','расчет','доплата','помощь','документ']},
    // Материалы / стройка
    {cat:'Закуп',keys:['цемент','клинец','кум','шебень','тас','материал','арматура','кирпич','агаш','лист','сетка','габион','краска','солярка','трамбовка','кабанчик','смеситель','корпе','тосек']},
    // Техника
    {cat:'Оборудование',keys:['погрузчик','экскаватор','кран','техника','вентиляц','электрик','электро']},
    // Продукты / еда
    {cat:'Продукты',keys:['продукты','нан','ет','мелочь','хлеб','еда']},
    // Транспорт
    {cat:'Транспорт',keys:['проезд','транспорт','такси','бензин','газ','авто']},
    // Аренда
    {cat:'Аренда',keys:['аренда','маркиза','мебель']},
  ];
  for(const rule of rules){
    for(const key of rule.keys){
      if(n.includes(key))return rule.cat;
    }
  }
  return null;
}

function getCidByName(catName){

async function doImport(){
  const rows=window._csvRows||[];
  const pid=window._importPid;
  const fallbackCid=window._importCid||D.categories[0]?.id;
  if(!rows.length||!pid)return;
  const btn=document.getElementById('import-btn');
  if(btn){btn.textContent='Импортируем...';btn.disabled=true;}
  let done=0;
  for(const row of rows){
    const detectedName=detectCategory(row.name);
    const cid=row.forceCid||(detectedName?getCidByName(detectedName):null)||fallbackCid;
    const e={pid,cid,amt:row.amt,note:row.name,payer:'me',created_at:row.date,adv:false,adv_total:null,party:'',adv_status:null,deadline:null};
    await addDoc(collection(db,'expenses'),e);

    if(btn)btn.textContent=`Импортируем... ${done}/${rows.length}`;

  render();

      e.created_at,
      c.name,
      pn,
      e.amt,
      '"'+(e.note||'').replace(/"/g,'""')+'"',
      e.adv?'Да':'',
      e.adv_total||'',
      e.adv?(e.adv_total||0)-e.amt:'',
      e.deadline||'',
      e.adv_status||''
    ]);
  });
  const csv='\uFEFF'+rows.map(r=>r.join(';')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=pr.name.replace(/[^а-яёА-ЯЁa-zA-Z0-9]/g,'_')+'_расходы.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function exportCSV(){
  const rows=[['Дата','Проект','Категория','Кто платит','Сумма','Комментарий','Аванс','Общая сумма','Остаток','Статус']];
  D.expenses.slice().sort((a,b)=>(b._t||0)-(a._t||0)).forEach(e=>{
    const pr=getproj(e.pid);const c=getcat(e.cid);const pn=pname(e.payer,pr);
    rows.push([e.created_at,pr.name,c.name,pn,e.amt,'"'+(e.note||'').replace(/"/g,'""')+'"',e.adv?'Да':'',e.adv_total||'',e.adv?(e.adv_total||0)-e.amt:'',e.adv_status||'']);
  });
  const csv='\uFEFF'+rows.map(r=>r.join(';')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='расходы.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function go(view){
  if(view==='project'&&!S.pid)view='projects';
  S.view=view;S.q='';S.fcat='all';S.fpay='all';

}
function openProj(id){S.pid=id;S.apid=id;go('project');}

// FAB — auto-pass project when inside project view
document.getElementById('fab').onclick=()=>openAddExp(S.view==='project'?S.pid:null);

// INVESTOR VIEW
async function loadInvView(){
  try{
    const[ps,cs,es]=await Promise.all([getDocs(collection(db,'projects')),getDocs(collection(db,'categories')),getDocs(collection(db,'expenses'))]);
    const pr=ps.docs.map(d=>({id:d.id,...d.data()})).find(p=>p.id===P.get('project'));
    if(!pr){$('app').innerHTML='<div class="loading"><div>Проект не найден</div></div>';return;}
    const inv=pr.investors?.find(i=>i.id===P.get('investor'));
    if(!inv){$('app').innerHTML='<div class="loading"><div>Нет доступа</div></div>';return;}
    D.projects=[pr];D.categories=cs.docs.map(d=>({id:d.id,...d.data()}));
    D.expenses=es.docs.map(d=>({id:d.id,...d.data(),_t:d.data().created_at?new Date(d.data().created_at).getTime():0})).filter(e=>e.pid===pr.id);
    renderInvView(pr,inv);
    onSnapshot(collection(db,'expenses'),snap=>{
      D.expenses=snap.docs.map(d=>({id:d.id,...d.data(),_t:d.data().created_at?new Date(d.data().created_at).getTime():0})).filter(e=>e.pid===pr.id);
      renderInvView(pr,inv);
    });
  }catch(e){$('app').innerHTML='<div class="loading"><div>Ошибка загрузки</div></div>';}
}

function renderInvView(pr,inv){
  const ex=D.expenses;const total=ex.reduce((s,e)=>s+e.amt,0);
  const byPay={};ex.forEach(e=>{const k=e.payer||'me';byPay[k]=(byPay[k]||0)+e.amt;});
  const payers=[{id:'me',name:pr.owner||'Руководитель'},...(pr.investors||[])];
  $('app').innerHTML=`
  <div class="topbar"><div style="flex:1"><div class="topbar-title">${pr.name}</div></div><span class="proj-badge badge-inv">Инвестор</span></div>
  <div class="page">
    <div class="inv-hero">
      <div class="inv-hero-label">Общие расходы</div>
      <div class="inv-hero-amount">${fmt(total)}</div>
    </div>
    <div class="sec-hdr"><span class="sec-title">Участники</span></div>
    <div class="exp-list" style="margin:0 16px 14px">
      ${payers.map(p=>{const a=byPay[p.id]||0;const pct=total?Math.round(a/total*100):0;const col=p.id==='me'?(pr.color||'#30D158'):avc(p.name);return`<div class="exp-item">
        <div class="avatar" style="background:${col};width:42px;height:42px;border-radius:14px">${ini(p.name)}</div>
        <div class="exp-body"><div class="exp-name">${p.name}</div><div class="exp-meta">${pct}% от общего</div></div>
        <div class="exp-amt">${fmt(a)}</div>
      </div>`;}).join('')}
    </div>
    <div class="sec-hdr"><span class="sec-title">Все расходы</span></div>
    ${ex.length===0?`<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Расходов пока нет</div></div>`:
    `<div class="exp-list">${ex.slice().sort((a,b)=>(b._t||0)-(a._t||0)).map(e=>{
      const c=getcat(e.cid);const ci=D.categories.findIndex(x=>x.id===e.cid);
      const pn=e.payer==='me'||!e.payer?(pr.owner||'Руководитель'):(pr.investors?.find(i=>i.id===e.payer)?.name||'—');
      const pc=(e.payer==='me'||!e.payer)?(pr.color||'#30D158'):avc(pn);
      return`<div class="exp-item">
        <div class="exp-ico" style="background:${ci>=0?cc(ci):ccId(e.cid)}22">${c.icon}</div>
        <div class="exp-body">
          <div class="exp-name">${e.note||c.name}</div>
          <div class="exp-meta"><span class="pill ${pi(ci)}">${c.name}</span><span class="pdot" style="background:${pc}"></span><span>${pn}</span><span style="color:var(--text3)">·</span><span>${dt(e.created_at)}</span></div>
        </div>
        <div class="exp-amt">${fmt(e.amt)}</div>
        ${e.c2_amt&&e.currency&&e.currency!=='KZT'?`<div style="font-size:11px;color:var(--blue);text-align:right">${(+e.c2_amt).toLocaleString('ru-RU',{maximumFractionDigits:2})} ${e.currency}</div>`:''}
      </div>`;}).join('')}</div>`}
  </div>`;
}

  });
