<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Учёт расходов</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#F2F2F7;color:#1C1C1E;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:0 0 90px}
.topbar{background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid rgba(0,0,0,0.12);padding:env(safe-area-inset-top,14px) 16px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.back-btn{background:none;border:none;cursor:pointer;color:#007AFF;font-size:17px;padding:0 4px;display:flex;align-items:center;gap:3px}
.topbar h1{font-size:17px;font-weight:600;flex:1;letter-spacing:-0.3px}
.topbar .subtitle{font-size:13px;color:#8E8E93}
.section{padding:12px 16px}
.section-title{font-size:12px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:opacity 0.1s}
.card:active{opacity:0.7}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-title{font-size:15px;font-weight:600}
.card-amount{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.card-meta{font-size:13px;color:#8E8E93;margin-top:2px}
.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));right:20px;width:56px;height:56px;border-radius:50%;background:#34C759;border:none;color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;box-shadow:0 4px 20px rgba(52,199,89,0.4)}
.fab:active{transform:scale(0.93)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:30;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:16px 20px calc(20px + env(safe-area-inset-bottom,0px));max-height:92vh;overflow-y:auto;animation:slideup 0.28s cubic-bezier(0.32,0.72,0,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:5px;background:#E5E5EA;border-radius:3px;margin:0 auto 18px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:18px;letter-spacing:-0.3px}
.form-group{margin-bottom:16px}
.form-label{font-size:13px;font-weight:600;color:#8E8E93;margin-bottom:8px;display:block;text-transform:uppercase;letter-spacing:0.3px}
.form-input{width:100%;padding:12px 14px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:16px;background:#fff;color:#1C1C1E;outline:none;font-family:inherit;-webkit-appearance:none}
.form-input:focus{border-color:#34C759}
.cat-grid{display:flex;flex-wrap:wrap;gap:8px}
.cat-btn{padding:8px 14px;border:1.5px solid #E5E5EA;border-radius:20px;font-size:14px;background:#fff;color:#1C1C1E;cursor:pointer;font-family:inherit}
.cat-btn.active{background:#34C759;border-color:#34C759;color:#fff}
.proj-btn{padding:12px 14px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:15px;background:#fff;color:#1C1C1E;cursor:pointer;margin-bottom:8px;width:100%;text-align:left;display:flex;align-items:center;gap:10px;font-family:inherit}
.proj-btn.active{border-color:#34C759;background:#F0FFF4;color:#1C7A3A}
.save-btn{width:100%;padding:15px;background:#34C759;border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:600;cursor:pointer;margin-top:10px;font-family:inherit}
.save-btn:active{opacity:0.85}
.save-btn:disabled{background:#C7C7CC;cursor:not-allowed}
.expense-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid #E5E5EA}
.expense-row:last-child{border-bottom:none}
.exp-icon{width:40px;height:40px;border-radius:50%;background:#F2F2F7;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.exp-info{flex:1;min-width:0}
.exp-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-sub{font-size:12px;color:#8E8E93;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-amount{font-size:16px;font-weight:600}
.icon-btn{background:none;border:none;cursor:pointer;padding:6px;color:#C7C7CC;font-size:14px;border-radius:8px}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block}
.badge-0{background:#D1FAE5;color:#065F46}.badge-1{background:#DBEAFE;color:#1E40AF}
.badge-2{background:#FEF3C7;color:#92400E}.badge-3{background:#FFE4E6;color:#9F1239}
.badge-4{background:#EDE9FE;color:#5B21B6}.badge-5{background:#F3F4F6;color:#374151}
.badge-6{background:#ECFDF5;color:#064E3B}.badge-7{background:#FDF2F8;color:#831843}
.empty{text-align:center;padding:40px 16px;color:#8E8E93;font-size:15px;line-height:1.6}
.search-wrap{position:relative;margin-bottom:10px}
.search-input{width:100%;padding:10px 14px 10px 38px;border:none;border-radius:12px;font-size:15px;background:#E5E5EA;color:#1C1C1E;outline:none;font-family:inherit}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#8E8E93;font-size:15px;pointer-events:none}
.total-bar{background:#F0FFF4;border-radius:14px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.total-label{font-size:14px;color:#1C7A3A;font-weight:500}
.total-val{font-size:22px;font-weight:700;color:#1C7A3A;letter-spacing:-0.5px}
canvas{width:100%!important;max-height:200px}
.proj-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.filter-bar{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{padding:7px 14px;border:1.5px solid #E5E5EA;border-radius:20px;font-size:13px;font-weight:500;background:#fff;color:#8E8E93;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit}
.filter-chip.active{background:#34C759;border-color:#34C759;color:#fff}
.sort-select{padding:8px 10px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:13px;background:#fff;color:#1C1C1E;outline:none;cursor:pointer;font-family:inherit;flex-shrink:0;-webkit-appearance:none;max-width:130px}
.cat-manage-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid #E5E5EA}
.cat-manage-row:last-child{border-bottom:none}
.cat-icon-pick{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.icon-pick-btn{width:40px;height:40px;border:1.5px solid #E5E5EA;border-radius:12px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;font-family:inherit}
.icon-pick-btn.active{border-color:#34C759;background:#F0FFF4}
.del-btn{background:none;border:1.5px solid #FFE4E6;border-radius:10px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:600;color:#FF3B30;flex-shrink:0;font-family:inherit}
.del-btn:active{background:#FFE4E6}
.tag-count{font-size:11px;background:#F2F2F7;padding:2px 8px;border-radius:10px;color:#8E8E93;font-weight:500}
.adv-badge-pending{background:#FEF3C7;color:#92400E;font-size:11px;padding:3px 9px;border-radius:10px;font-weight:600;display:inline-block}
.adv-badge-done{background:#D1FAE5;color:#065F46;font-size:11px;padding:3px 9px;border-radius:10px;font-weight:600;display:inline-block}
.adv-bar-wrap{background:#E5E5EA;border-radius:4px;height:5px;width:100%;margin-top:5px;overflow:hidden}
.adv-bar-fill{height:100%;border-radius:4px;background:#34C759}
.bill-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;border-left:4px solid #FF9500}
.bill-card.done{border-left-color:#34C759}
.toggle-btn{padding:7px 14px;border:1.5px solid #E5E5EA;border-radius:20px;font-size:13px;font-weight:500;background:#fff;color:#8E8E93;cursor:pointer;font-family:inherit}
.toggle-btn.active{background:#FF9500;border-color:#FF9500;color:#fff}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:0.5px solid #E5E5EA;font-size:14px}
.summary-row:last-child{border-bottom:none}
.bar-wrap{background:#F2F2F7;border-radius:4px;height:7px;flex:1;margin:0 10px;overflow:hidden;min-width:40px}
.bar-fill{height:100%;border-radius:4px;transition:width 0.4s}
.topbar-actions{display:flex;gap:4px}
.topbar-btn{background:none;border:none;cursor:pointer;font-size:20px;padding:4px;border-radius:8px;line-height:1}
.topbar-btn:active{background:#F2F2F7}
.investor-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.investor-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #E5E5EA}
.investor-row:last-child{border-bottom:none}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.type-badge{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.type-personal{background:#DBEAFE;color:#1E40AF}
.type-investor{background:#EDE9FE;color:#5B21B6}
.payer-grid{display:flex;flex-wrap:wrap;gap:8px}
.payer-btn{padding:8px 14px;border:1.5px solid #E5E5EA;border-radius:20px;font-size:14px;background:#fff;color:#1C1C1E;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
.payer-btn.active{background:#5856D6;border-color:#5856D6;color:#fff}
.link-box{background:#F2F2F7;border-radius:12px;padding:12px 14px;font-size:13px;color:#1C1C1E;word-break:break-all;margin-top:8px;font-family:monospace}
.copy-btn{width:100%;padding:12px;background:#F2F2F7;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;color:#007AFF;font-family:inherit;margin-top:8px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #E5E5EA;border-top-color:#34C759;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:#8E8E93;font-size:15px}
</style>
</head>
<body>
<div class="app" id="app"><div class="loading-screen"><div class="spinner"></div><div>Загрузка...</div></div></div>
<button class="fab" id="fab" style="display:none">+</button>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,doc,getDocs,addDoc,setDoc,updateDoc,deleteDoc,onSnapshot,query,orderBy}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig={
  apiKey:"AIzaSyAaDOtqcnqQbyxttj5y8IYAUHxMTsrspj4",
  authDomain:"expenses-app-a4565.firebaseapp.com",
  projectId:"expenses-app-a4565",
  storageBucket:"expenses-app-a4565.firebasestorage.app",
  messagingSenderId:"918179761678",
  appId:"1:918179761678:web:85968596424ed5cc1bb65f"
};
const fbApp=initializeApp(firebaseConfig);
const db=getFirestore(fbApp);

const COLORS=['#34C759','#007AFF','#FF6B35','#AF52DE','#FF2D55','#FF9500','#30D158','#FF3B30','#5856D6','#00C7BE'];
const ALL_ICONS=['🛒','🏠','💼','📦','🚗','💡','📢','🔧','📌','🍔','☕','🎯','🏥','📱','✈️','🎁','💰','🖥️','👗','🏋️'];
const SORT_OPTS=[{v:'date_desc',l:'Сначала новые'},{v:'date_asc',l:'Сначала старые'},{v:'amount_desc',l:'Дороже сначала'},{v:'amount_asc',l:'Дешевле сначала'},{v:'cat',l:'По категории'}];

// check if investor view
const urlParams=new URLSearchParams(window.location.search);
const investorToken=urlParams.get('investor');
const projectToken=urlParams.get('project');
const isInvestorView=!!(investorToken&&projectToken);

let state={view:'projects',projectId:null,modal:null,search:'',filterCat:'all',filterPayer:'all',sortBy:'date_desc',analyticsProjectId:null};
let data={projects:[],categories:[],expenses:[]};
let chartInstance=null;
let editCatId=null;
let editProjId=null;
let tempCat={name:'',icon:'📌'};
let selProjColor=COLORS[0];
let selProjType='personal';
let projInvestors=[];
let tempForm={project_id:null,category_id:null,amount:'',comment:'',payer_id:'me'};
let unsubscribes=[];

function getCat(id){return data.categories.find(c=>c.id===id)||{name:'Прочее',icon:'📌',id:'?'}}
function getProj(id){return data.projects.find(p=>p.id===id)||{name:'—',color:'#C7C7CC',type:'personal',investors:[]}}
function catBadgeClass(idx){return 'badge-'+(idx%8)}
function projectTotal(pid){return data.expenses.filter(e=>e.project_id===pid).reduce((s,e)=>s+e.amount,0)}
function allTotal(){return data.expenses.reduce((s,e)=>s+e.amount,0)}
function fmt(n){return (+n).toLocaleString('ru-RU')+'₸'}
function dateStr(d){return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}
function catColor(idx){return COLORS[idx%COLORS.length]}
function avatarColor(str){const colors=['#FF6B35','#AF52DE','#007AFF','#FF2D55','#FF9500','#5856D6','#00C7BE'];let h=0;for(let c of str)h=(h*31+c.charCodeAt(0))%colors.length;return colors[h]}
function initials(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function payerName(payerId,proj){if(payerId==='me'||!payerId)return'Я';const inv=proj?.investors?.find(i=>i.id===payerId);return inv?inv.name:'—'}

function sortExpenses(arr){
  const a=arr.slice();
  if(state.sortBy==='date_desc')return a.sort((x,y)=>y.id>x.id?1:-1);
  if(state.sortBy==='date_asc')return a.sort((x,y)=>x.id>y.id?1:-1);
  if(state.sortBy==='amount_desc')return a.sort((x,y)=>y.amount-x.amount);
  if(state.sortBy==='amount_asc')return a.sort((x,y)=>x.amount-y.amount);
  if(state.sortBy==='cat')return a.sort((x,y)=>getCat(x.category_id).name.localeCompare(getCat(y.category_id).name,'ru'));
  return a;
}

// FIRESTORE
async function loadData(){
  const [projSnap,catSnap,expSnap]=await Promise.all([
    getDocs(collection(db,'projects')),
    getDocs(collection(db,'categories')),
    getDocs(collection(db,'expenses'))
  ]);
  data.projects=projSnap.docs.map(d=>({id:d.id,...d.data()}));
  data.categories=catSnap.docs.map(d=>({id:d.id,...d.data()}));
  data.expenses=expSnap.docs.map(d=>({id:d.id,...d.data()}));
  if(data.categories.length===0) await seedCategories();
}

async function seedCategories(){
  const cats=[{name:'Продукты',icon:'🛒'},{name:'Аренда',icon:'🏠'},{name:'Зарплата',icon:'💼'},{name:'Закуп',icon:'📦'},{name:'Транспорт',icon:'🚗'},{name:'Коммуналка',icon:'💡'},{name:'Маркетинг',icon:'📢'},{name:'Оборудование',icon:'🔧'},{name:'Прочее',icon:'📌'}];
  for(const c of cats){const ref=await addDoc(collection(db,'categories'),c);data.categories.push({id:ref.id,...c});}
}

function subscribeExpenses(){
  unsubscribes.forEach(u=>u());unsubscribes=[];
  const unsub=onSnapshot(collection(db,'expenses'),snap=>{
    snap.docChanges().forEach(change=>{
      if(change.type==='added'){if(!data.expenses.find(e=>e.id===change.doc.id))data.expenses.push({id:change.doc.id,...change.doc.data()});}
      else if(change.type==='modified'){const i=data.expenses.findIndex(e=>e.id===change.doc.id);if(i>=0)data.expenses[i]={id:change.doc.id,...change.doc.data()};}
      else if(change.type==='removed'){data.expenses=data.expenses.filter(e=>e.id!==change.doc.id);}
    });
    render();
  });
  unsubscribes.push(unsub);
}

async function addExpense(e){
  await addDoc(collection(db,'expenses'),e);
  // don't push locally — onSnapshot will add it
}
async function removeExpense(id){
  await deleteDoc(doc(db,'expenses',id));
  data.expenses=data.expenses.filter(e=>e.id!==id);
  render();
}
async function addProject(p){
  const ref=await addDoc(collection(db,'projects'),p);
  data.projects.push({id:ref.id,...p});
}
async function updateProject(id,p){
  await updateDoc(doc(db,'projects',id),p);
  const i=data.projects.findIndex(x=>x.id===id);
  if(i>=0)data.projects[i]={...data.projects[i],...p};
}
async function removeProject(id){
  await deleteDoc(doc(db,'projects',id));
  data.projects=data.projects.filter(p=>p.id!==id);
  const toDelete=data.expenses.filter(e=>e.project_id===id);
  for(const e of toDelete)await deleteDoc(doc(db,'expenses',e.id));
  data.expenses=data.expenses.filter(e=>e.project_id!==id);
}
async function addCategory(c){
  const ref=await addDoc(collection(db,'categories'),c);
  data.categories.push({id:ref.id,...c});
}
async function updateCategory(id,c){
  await updateDoc(doc(db,'categories',id),c);
  const i=data.categories.findIndex(x=>x.id===id);
  if(i>=0)data.categories[i]={...data.categories[i],...c};
}
async function removeCategory(id){
  const fb=data.categories.find(c=>c.name==='Прочее'&&c.id!==id)||data.categories.find(c=>c.id!==id);
  if(fb){
    const toUpdate=data.expenses.filter(e=>e.category_id===id);
    for(const e of toUpdate){await updateDoc(doc(db,'expenses',e.id),{category_id:fb.id});e.category_id=fb.id;}
  }
  await deleteDoc(doc(db,'categories',id));
  data.categories=data.categories.filter(c=>c.id!==id);
}

// INVESTOR VIEW
async function loadInvestorView(){
  const snap=await getDocs(collection(db,'projects'));
  const proj=snap.docs.map(d=>({id:d.id,...d.data()})).find(p=>p.id===projectToken);
  if(!proj){document.getElementById('app').innerHTML='<div class="empty" style="padding-top:80px">Проект не найден</div>';return;}
  const inv=proj.investors?.find(i=>i.id===investorToken);
  if(!inv){document.getElementById('app').innerHTML='<div class="empty" style="padding-top:80px">Нет доступа</div>';return;}
  const expSnap=await getDocs(collection(db,'expenses'));
  const catSnap=await getDocs(collection(db,'categories'));
  data.projects=[proj];
  data.categories=catSnap.docs.map(d=>({id:d.id,...d.data()}));
  data.expenses=expSnap.docs.map(d=>({id:d.id,...d.data()})).filter(e=>e.project_id===projectToken);
  state.view='investorview';
  state.projectId=projectToken;
  renderInvestorView(proj,inv);
  // live update
  onSnapshot(collection(db,'expenses'),snap=>{
    data.expenses=snap.docs.map(d=>({id:d.id,...d.data()})).filter(e=>e.project_id===projectToken);
    renderInvestorView(proj,inv);
  });
}

function renderInvestorView(proj,inv){
  const exps=data.expenses;
  const total=exps.reduce((s,e)=>s+e.amount,0);
  const byPayer={};
  exps.forEach(e=>{const pid=e.payer_id||'me';byPayer[pid]=(byPayer[pid]||0)+e.amount;});
  const allPayers=[{id:'me',name:'Руководитель'},...(proj.investors||[])];
  document.getElementById('app').innerHTML=`
<div class="topbar">
  <h1 style="flex:1">${proj.name}</h1>
  <span class="type-badge type-investor">Инвестор</span>
</div>
<div class="section">
  <div class="total-bar"><span class="total-label">Общие расходы</span><span class="total-val">${fmt(total)}</span></div>
  <div class="section-title">Участники</div>
  <div class="investor-card">
    ${allPayers.map(p=>{
      const amt=byPayer[p.id]||0;
      const pct=total?Math.round(amt/total*100):0;
      const col=p.id==='me'?'#34C759':avatarColor(p.name);
      return`<div class="investor-row">
        <div style="display:flex;align-items:center;gap:10px;flex:1">
          <div class="avatar" style="background:${col}">${p.id==='me'?'Я':initials(p.name)}</div>
          <div>
            <div style="font-size:15px;font-weight:600">${p.id==='me'?'Руководитель':p.name}</div>
            <div style="font-size:12px;color:#8E8E93">${pct}% от общего</div>
          </div>
        </div>
        <div style="font-size:17px;font-weight:700">${fmt(amt)}</div>
      </div>`;
    }).join('')}
  </div>

function destroyChart(){if(chartInstance){chartInstance.destroy();chartInstance=null;}}
function renderChart(){
  const pid=state.analyticsProjectId;
  let exps=pid?data.expenses.filter(e=>e.project_id===pid):data.expenses;
  const bycat={};exps.forEach(e=>{bycat[e.category_id]=(bycat[e.category_id]||0)+e.amount});
  const cats=Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  const el=document.getElementById('myChart');
  if(!el||!cats.length)return;
  chartInstance=new Chart(el,{type:'doughnut',data:{labels:cats.map(([cid])=>getCat(cid).name),datasets:[{data:cats.map(([,v])=>v),backgroundColor:cats.map(([cid])=>{const i=data.categories.findIndex(c=>c.id===cid);return catColor(i)}),borderWidth:3,borderColor:'#fff'}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:13},padding:12,boxWidth:14}},tooltip:{callbacks:{label:ctx=>{const v=ctx.raw;const t=ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);return ctx.label+': '+fmt(v)+' ('+Math.round(v/t*100)+'%)'}}}},cutout:'62%'}});
}

    <label class="form-label">Категория</label>
    <div class="cat-grid">${data.categories.map(c=>`<button class="cat-btn${tempForm.category_id===c.id?' active':''}" onclick="selectCat('${c.id}')">${c.icon} ${c.name}</button>`).join('')}</div>
  </div>
  ${isInv?`<div class="form-group">
    <label class="form-label">Кто платит</label>
    <div class="payer-grid">
      <button class="payer-btn${tempForm.payer_id==='me'?' active':''}" onclick="selectPayer('me')"><span style="width:24px;height:24px;border-radius:50%;background:#34C759;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">Я</span>Я</button>
      ${(selProj.investors||[]).map(inv=>`<button class="payer-btn${tempForm.payer_id===inv.id?' active':''}" onclick="selectPayer('${inv.id}')"><span style="width:24px;height:24px;border-radius:50%;background:${avatarColor(inv.name)};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">${initials(inv.name)}</span>${inv.name}</button>`).join('')}
    </div>
  </div>`:''}
  <div class="form-group">
    <label class="form-label">Сумма (₸)</label>
    <input id="amt-input" class="form-input" type="number" inputmode="numeric" placeholder="0" value="${tempForm.amount}" oninput="tempForm.amount=this.value" onkeydown="if(event.key==='Enter')document.getElementById('cmt-input').focus()" style="font-size:22px;font-weight:700" />
  </div>
  <div class="form-group">
    <label class="form-label">Комментарий</label>
    <input id="cmt-input" class="form-input" type="text" placeholder="Что за расход?" value="${tempForm.comment}" oninput="tempForm.comment=this.value" onkeydown="if(event.key==='Enter')doSaveExpense()" />
  </div>
  <button class="save-btn" onclick="doSaveExpense()" ${(tempForm.project_id&&String(tempForm.amount).trim())?'':'disabled'}>Сохранить</button>
</div>`;
}

function buildNewProjectModal(){
  const editing=editProjId?getProj(editProjId):null;
  return`<div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title">${editing?'Редактировать проект':'Новый проект'}</div>
  <div class="form-group">
    <label class="form-label">Тип проекта</label>
    <div style="display:flex;gap:8px">
      <button class="cat-btn${selProjType==='personal'?' active':''}" onclick="selectProjType('personal')">👤 Личный</button>
      <button class="cat-btn${selProjType==='investor'?' active':''}" onclick="selectProjType('investor')">👥 Инвесторский</button>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Название</label>
    <input id="proj-name-input" class="form-input" type="text" placeholder="Название проекта..." value="${editing?editing.name:''}" />
  </div>
  <div class="form-group">
    <label class="form-label">Цвет</label>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${COLORS.map((c,i)=>`<div onclick="selectProjColor('${c}')" style="width:36px;height:36px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${c===selProjColor?'#1C1C1E':'transparent'};transition:border-color 0.15s"></div>`).join('')}
    </div>
  </div>
  ${selProjType==='investor'?`<div class="form-group">
    <label class="form-label">Инвесторы</label>
    ${tempNewInvestors.map((inv,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div class="avatar" style="background:${avatarColor(inv.name)};width:34px;height:34px;font-size:13px">${initials(inv.name)}</div>
      <span style="flex:1;font-size:15px">${inv.name}</span>
      <button onclick="removeInvestor(${i})" class="del-btn">✕</button>
    </div>`).join('')}
    <div style="display:flex;gap:8px;margin-top:4px">
      <input id="inv-name-input" class="form-input" type="text" placeholder="Имя инвестора..." style="flex:1" onkeydown="if(event.key==='Enter')addInvestorFromInput()" />
      <button onclick="addInvestorFromInput()" style="padding:10px 14px;background:#5856D6;border:none;border-radius:12px;color:#fff;font-size:15px;cursor:pointer;font-family:inherit">+</button>
    </div>
    ${tempNewInvestors.length>0?`<div style="margin-top:12px">
      <div style="font-size:13px;color:#8E8E93;margin-bottom:6px">Ссылки для инвесторов (после сохранения):</div>
      ${editProjId?tempNewInvestors.map(inv=>`<div style="margin-bottom:10px">
        <div style="font-size:13px;font-weight:600;margin-bottom:4px">${inv.name}</div>
        <div class="link-box">${buildInvestorLink(editProjId,inv.id)}</div>
        <button class="copy-btn" onclick="copyLink('${buildInvestorLink(editProjId,inv.id)}')">📋 Копировать ссылку</button>
      </div>`).join(''):'<div style="font-size:13px;color:#8E8E93">Ссылки появятся после создания проекта</div>'}
    </div>`:''}
  </div>`:''}
  ${editing?`<button class="del-btn" style="width:100%;margin-bottom:8px;padding:12px;font-size:15px;border-radius:14px" onclick="doDeleteProject('${editing.id}')">Удалить проект</button>`:''}
  <button class="save-btn" onclick="doSaveProject()">${editing?'Сохранить':'Создать проект'}</button>
</div>`;
}

function buildCatModal(){
  return`<div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title">${editCatId?'Редактировать':'Новая категория'}</div>
  <div class="form-group">
    <label class="form-label">Название</label>
    <input id="cat-name-input" class="form-input" type="text" placeholder="Название категории..." value="${tempCat.name}" oninput="tempCat.name=this.value" />
  </div>
  <div class="form-group">
    <label class="form-label">Иконка — <span id="cur-icon">${tempCat.icon}</span></label>
    <div class="cat-icon-pick">${ALL_ICONS.map(ic=>`<button class="icon-pick-btn${tempCat.icon===ic?' active':''}" onclick="pickIcon('${ic}')">${ic}</button>`).join('')}</div>
  </div>
  <button class="save-btn" onclick="doSaveCategory()" ${!tempCat.name?'disabled':''}>Сохранить</button>
</div>`;
}

function buildInvestorLink(projId,invId){
  const base=window.location.href.split('?')[0];
  return`${base}?project=${projId}&investor=${invId}`;
}
function copyLink(link){
  navigator.clipboard.writeText(link).then(()=>{alert('Ссылка скопирована!')}).catch(()=>{prompt('Скопируйте ссылку:',link)});
}

// actions
function syncFormInputs(){const amt=document.getElementById('amt-input');const cmt=document.getElementById('cmt-input');if(amt)tempForm.amount=amt.value;if(cmt)tempForm.comment=cmt.value;}
function refreshAddModal(){const overlay=document.getElementById('modal-overlay');if(!overlay)return;const modal=overlay.querySelector('.modal');const st=modal?modal.scrollTop:0;overlay.innerHTML=buildAddModal();const m2=document.querySelector('#modal-overlay .modal');if(m2)m2.scrollTop=st;}
function selectProj(id){syncFormInputs();tempForm.project_id=id;tempForm.payer_id='me';refreshAddModal();}
function selectCat(id){syncFormInputs();tempForm.category_id=id;refreshAddModal();}
function selectPayer(id){syncFormInputs();tempForm.payer_id=id;refreshAddModal();}
function selectProjColor(c){selProjColor=c;document.getElementById('modal-overlay').innerHTML=buildNewProjectModal();}
function selectProjType(t){selProjType=t;document.getElementById('modal-overlay').innerHTML=buildNewProjectModal();setTimeout(()=>{const a=document.getElementById('proj-name-input');if(a)a.focus();},50);}
function addInvestorFromInput(){
  const inp=document.getElementById('inv-name-input');
  if(!inp||!inp.value.trim())return;
  tempNewInvestors.push({id:'inv_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),name:inp.value.trim()});
  document.getElementById('modal-overlay').innerHTML=buildNewProjectModal();
}
function removeInvestor(i){tempNewInvestors.splice(i,1);document.getElementById('modal-overlay').innerHTML=buildNewProjectModal();}
function pickIcon(ic){tempCat.icon=ic;const el=document.getElementById('cur-icon');if(el)el.textContent=ic;document.querySelectorAll('.icon-pick-btn').forEach(b=>{b.classList.toggle('active',b.textContent===ic);});}

async function doSaveExpense(){
  const amt=document.getElementById('amt-input');const cmt=document.getElementById('cmt-input');
  if(amt)tempForm.amount=amt.value;if(cmt)tempForm.comment=cmt.value;
  if(!tempForm.project_id||!String(tempForm.amount).trim())return;
  const totalAmt=tempForm.is_advance&&tempForm.total_amount?parseFloat(tempForm.total_amount):null;
  const e={project_id:tempForm.project_id,category_id:tempForm.category_id||data.categories[0]?.id,amount:parseFloat(tempForm.amount),comment:tempForm.comment,payer_id:tempForm.payer_id||'me',created_at:new Date().toISOString().split('T')[0],is_advance:tempForm.is_advance||false,total_amount:totalAmt,counterparty:tempForm.counterparty||'',advance_paid:tempForm.is_advance?parseFloat(tempForm.amount):null,advance_status:tempForm.is_advance?'pending':null};
  closeModal();
  await addExpense(e);
  render();
}

async function doSaveProject(){
  const inp=document.getElementById('proj-name-input');
  if(!inp||!inp.value.trim())return;
  const p={name:inp.value.trim(),color:selProjColor,type:selProjType,investors:selProjType==='investor'?tempNewInvestors:[]};
  closeModal();
  if(editProjId){await updateProject(editProjId,p);}
  else{await addProject(p);}
  render();
}

async function doDeleteProject(id){
  closeModal();
  await removeProject(id);
  state.view='projects';state.projectId=null;
  render();
}

async function doSaveCategory(){
  if(!tempCat.name.trim())return;
  closeModal();
  if(editCatId){await updateCategory(editCatId,{name:tempCat.name.trim(),icon:tempCat.icon});}
  else{await addCategory({name:tempCat.name.trim(),icon:tempCat.icon});}
  render();
}

async function doDeleteCategory(id){
  await removeCategory(id);render();
}

async function doDeleteExpense(id){
  await removeExpense(id);
}

function setFilterCat(val){state.filterCat=val;render();}
function setFilterPayer(val){state.filterPayer=val;render();}
function setSort(val){state.sortBy=val;render();}
function openBills(){state.view='bills';render();}

function renderBills(){
  const bills=data.expenses.filter(e=>e.is_advance);
  const pending=bills.filter(e=>e.advance_status==='pending');
  const done=bills.filter(e=>e.advance_status==='done');
  const totalPending=pending.reduce((s,e)=>s+(e.total_amount||0)-(e.advance_paid||e.amount),0);
  return\`
<div class="topbar">
  <button class="back-btn" onclick="goBack()">‹ Назад</button>
  <h1 style="flex:1;text-align:center">Счета и авансы</h1>
</div>
<div class="section">
  \${pending.length>0?\`<div style="background:#FEF3C7;border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:13px;font-weight:600;color:#92400E">Ожидает доплаты</div><div style="font-size:11px;color:#92400E;margin-top:2px">\${pending.length} счётов</div></div>
    <div style="font-size:20px;font-weight:700;color:#92400E">\${fmt(totalPending)}</div>
  </div>\`:''}
  \${pending.length>0?\`<div class="section-title">Не закрытые (\${pending.length})</div>
  \${pending.map(e=>{
    const proj=getProj(e.project_id);
    const cat=getCat(e.category_id);
    const paid=e.advance_paid||e.amount;
    const total=e.total_amount||paid;
    const remain=total-paid;
    const pct=Math.round(paid/total*100);
    return\`<div class="bill-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:600">\${e.comment||cat.name}</div>
          <div style="font-size:12px;color:#8E8E93;margin-top:2px">\${cat.icon} \${cat.name} · <span style="display:inline-flex;align-items:center;gap:3px"><span class="proj-dot" style="background:\${proj.color}"></span>\${proj.name}</span></div>
          \${e.counterparty?\`<div style="font-size:12px;color:#8E8E93;margin-top:2px">👤 \${e.counterparty}</div>\`:''}
        </div>
        <button class="icon-btn" onclick="markAdvanceDone('\${e.id}')" style="color:#34C759;font-size:20px;flex-shrink:0" title="Отметить как оплачено">✓</button>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
        <span style="color:#8E8E93">Аванс: <strong style="color:#1C1C1E">\${fmt(paid)}</strong></span>
        <span style="color:#8E8E93">Остаток: <strong style="color:#FF3B30">\${fmt(remain)}</strong></span>
        <span style="color:#8E8E93">Итого: <strong style="color:#1C1C1E">\${fmt(total)}</strong></span>
      </div>
      <div class="adv-bar-wrap"><div class="adv-bar-fill" style="width:\${pct}%"></div></div>
      <div style="font-size:11px;color:#8E8E93;margin-top:4px;text-align:right">\${pct}% оплачено · \${dateStr(e.created_at)}</div>
    </div>\`;
  }).join('')}\`:'<div class="empty">Все счета закрыты 🎉</div>'}
  \${done.length>0?\`<div class="section-title" style="margin-top:8px">Закрытые (\${done.length})</div>
  \${done.map(e=>{
    const proj=getProj(e.project_id);
    const cat=getCat(e.category_id);
    const total=e.total_amount||e.amount;
    return\`<div class="bill-card done" style="opacity:0.7">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:15px;font-weight:600">\${e.comment||cat.name}</div>
          <div style="font-size:12px;color:#8E8E93;margin-top:2px">\${cat.icon} \${cat.name} · \${proj.name}</div>
          \${e.counterparty?\`<div style="font-size:12px;color:#8E8E93">👤 \${e.counterparty}</div>\`:''}
        </div>
        <div style="text-align:right">
          <div style="font-size:16px;font-weight:700;color:#34C759">\${fmt(total)}</div>
          <span class="adv-badge-done">Закрыт</span>
        </div>
      </div>
    </div>\`;
  }).join('')}\`:''}
</div>\`;
}

async function markAdvanceDone(id){
  const {updateDoc,doc}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  await updateDoc(doc(db,'expenses',id),{advance_status:'done'});
  const e=data.expenses.find(x=>x.id===id);
  if(e) e.advance_status='done';
  render();
}

function exportCSV(){
  const rows=[['Дата','Проект','Категория','Кто платит','Сумма','Комментарий']];
  data.expenses.slice().sort((a,b)=>b.id>a.id?1:-1).forEach(e=>{
    const proj=getProj(e.project_id);
    rows.push([e.created_at,proj.name,getCat(e.category_id).name,payerName(e.payer_id,proj),e.amount,'"'+(e.comment||'').replace(/"/g,'""')+'"']);
  });
  const csv='\uFEFF'+rows.map(r=>r.join(';')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='расходы.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function closeModal(){const o=document.getElementById('modal-overlay');if(o)o.remove();state.modal=null;}

// expose to global
window.openProject=openProject;window.openAnalytics=openAnalytics;window.openCategoriesPage=openCategoriesPage;
window.openAllExpenses=openAllExpenses;window.openNewProject=openNewProject;window.openEditProject=openEditProject;
window.openAddCategoryModal=openAddCategoryModal;window.openEditCategoryModal=openEditCategoryModal;
window.goBack=goBack;window.doDeleteExpense=doDeleteExpense;window.doDeleteCategory=doDeleteCategory;
window.doDeleteProject=doDeleteProject;window.doSaveExpense=doSaveExpense;window.doSaveProject=doSaveProject;
window.doSaveCategory=doSaveCategory;window.selectProj=selectProj;window.selectCat=selectCat;
window.selectPayer=selectPayer;window.selectProjColor=selectProjColor;window.selectProjType=selectProjType;
window.addInvestorFromInput=addInvestorFromInput;window.removeInvestor=removeInvestor;window.pickIcon=pickIcon;
window.copyLink=copyLink;window.exportCSV=exportCSV;window.openBills=openBills;window.setFilterCat=setFilterCat;window.setFilterPayer=setFilterPayer;window.setSort=setSort;window.markAdvanceDone=markAdvanceDone;window.closeModal=closeModal;
window.state=state;

document.getElementById('fab').onclick=()=>openAddExpense(state.view==='project'?state.projectId:null);

// INIT
if(isInvestorView){
  document.getElementById('fab').style.display='none';
  loadInvestorView();
} else {
  loadData().then(()=>{subscribeExpenses();render();}).catch(err=>{
    console.error('Firebase error:', err);
    document.getElementById('app').innerHTML=`<div class="loading-screen" style="gap:20px">
      <div style="font-size:40px">⚠️</div>
      <div style="font-size:17px;font-weight:600;color:#1C1C1E;text-align:center">Нет доступа к базе данных</div>
      <div style="font-size:14px;color:#8E8E93;text-align:center;padding:0 32px;line-height:1.6">Зайдите в Firebase Console → Firestore Database → Rules и установите правила доступа</div>
      <div style="background:#F2F2F7;border-radius:12px;padding:14px 16px;font-size:13px;font-family:monospace;color:#1C1C1E;margin:0 16px;line-height:1.8">
        rules_version = '2';<br>
        service cloud.firestore {<br>
        &nbsp;match /databases/{db}/documents {<br>
        &nbsp;&nbsp;match /{doc=**} {<br>
        &nbsp;&nbsp;&nbsp;allow read, write: if true;<br>
        &nbsp;&nbsp;}<br>
        &nbsp;}<br>
        }
      </div>
      <button onclick="location.reload()" style="background:#34C759;border:none;border-radius:12px;padding:13px 24px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit">Обновить после настройки</button>
    </div>`;
    document.getElementById('fab').style.display='none';
  });
}
</script>
</body>
</html>
